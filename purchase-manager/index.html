<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    <span class="ku">بەڕێوەبردنی کڕین</span><span class="en" style="display:none">Purchase Manager</span>
  </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>
      <span class="ku">بەڕێوەبردنی کڕین</span>
      <span class="en">Purchase Manager</span>
    </h1>
    <button id="langToggle">EN</button>
  </header>

  <!-- TABS NAV -->
  <nav class="tabs">
    <button id="tabAdd" class="tab active">
      <span class="ku">زیادکردنی کڕین</span>
      <span class="en">Add Purchase</span>
    </button>
    <button id="tabList" class="tab">
      <span class="ku">لیستی کڕینەکان</span>
      <span class="en">Purchase List</span>
    </button>
  </nav>

  <!-- ADD TAB -->
  <section id="addTab" class="tab-content active">

    <!-- Card 1: Required -->
    <div class="card" id="card-required">
      <div class="card-title">
        <span class="ku">زانیاری پێویستەکان</span>
        <span class="en">Required Information</span>
      </div>

      <!-- Supplier -->
      <div class="field-group">
        <label for="supplier">
          <span class="ku">ناوی دابینکەر</span>
          <span class="en">Supplier Name</span>
          <span class="required-star">*</span>
        </label>
        <input
          type="text"
          id="supplier"
          data-ph-ku="بۆ نموونە: شیرکەتی ئەپڵ"
          data-ph-en="e.g. Apple Inc."
        />
      </div>

      <!-- Date -->
      <div class="field-group">
        <label for="date">
          <span class="ku">بەروار</span>
          <span class="en">Date</span>
          <span class="required-star">*</span>
        </label>
        <input type="date" id="date" />
      </div>

      <!-- Mobile -->
      <div class="field-group">
        <label for="mobile">
          <span class="ku">ژمارەی مۆبایل</span>
          <span class="en">Mobile Number</span>
        </label>
        <input
          type="tel"
          id="mobile"
          data-ph-ku="بۆ نموونە: ٠٧٧٠ ١٢٣ ٤٥٦٧"
          data-ph-en="e.g. 0770 123 4567"
        />
      </div>

      <!-- Address -->
      <div class="field-group">
        <label for="address">
          <span class="ku">ناونیشان</span>
          <span class="en">Address</span>
        </label>
        <input
          type="text"
          id="address"
          data-ph-ku="بۆ نموونە: سلێمانی، عێراق"
          data-ph-en="e.g. Sulaymaniyah, Iraq"
        />
      </div>

      <!-- Product Name -->
      <div class="field-group">
        <label for="productName">
          <span class="ku">ناوی بەرهەم</span>
          <span class="en">Product Name</span>
          <span class="required-star">*</span>
        </label>
        <input
          type="text"
          id="productName"
          data-ph-ku="بۆ نموونە: ئایفۆن ١٦ پڕۆ"
          data-ph-en="e.g. iPhone 16 Pro"
        />
      </div>

      <!-- Quantity -->
      <div class="field-group">
        <label for="qty">
          <span class="ku">بڕ</span>
          <span class="en">Quantity</span>
          <span class="required-star">*</span>
        </label>
        <input
          type="number"
          id="qty"
          min="1"
          max="100"
          value="1"
        />
      </div>

      <!-- Purchase Price Row -->
      <div class="field-group">
        <label>
          <span class="ku">نرخی کڕین</span>
          <span class="en">Purchase Price</span>
          <span class="required-star">*</span>
        </label>
        <div class="price-row">
          <div class="price-field">
            <span class="price-badge">IQD</span>
            <input
              type="number"
              id="buyIQD"
              class="price-input"
              min="0"
              step="500"
              data-ph-ku="0"
              data-ph-en="0"
              placeholder="0"
            />
          </div>
          <div class="price-field">
            <span class="price-badge">USD</span>
            <input
              type="number"
              id="buyUSD"
              class="price-input"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </div>
      </div>

      <!-- Sell Price Row -->
      <div class="field-group">
        <label>
          <span class="ku">نرخی فرۆشتن</span>
          <span class="en">Selling Price</span>
        </label>
        <div class="price-row">
          <div class="price-field">
            <span class="price-badge">IQD</span>
            <input
              type="number"
              id="sellIQD"
              class="price-input"
              min="0"
              step="500"
              placeholder="0"
            />
          </div>
          <div class="price-field">
            <span class="price-badge">USD</span>
            <input
              type="number"
              id="sellUSD"
              class="price-input"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </div>
      </div>

      <!-- Auto Total -->
      <div class="field-group">
        <label>
          <span class="ku">کۆی گشتی (بڕ × نرخی کڕین)</span>
          <span class="en">Grand Total (Qty × Purchase Price)</span>
        </label>
        <div class="auto-total-box">
          <span id="autoTotalDisplay">0</span>
          <span class="total-currency">IQD</span>
        </div>
      </div>

      <!-- ID Type -->
      <div class="field-group">
        <label>
          <span class="ku">جۆری ئایدی</span>
          <span class="en">ID Type</span>
          <span class="required-star">*</span>
        </label>
        <div class="id-type-row">
          <button class="id-type-btn" data-type="shared" id="btnIdShared">
            <span class="ku">ئایدی هاوبەش</span>
            <span class="en">Shared ID</span>
          </button>
          <button class="id-type-btn" data-type="custom" id="btnIdCustom">
            <span class="ku">ئایدیی تایبەت</span>
            <span class="en">Custom IDs</span>
          </button>
        </div>

        <!-- Shared ID Section -->
        <div id="sharedIdSection" class="id-sub-section" style="display:none">
          <input
            type="text"
            id="sharedIdValue"
            data-ph-ku="ئایدی یەکسانی هەموو بەرهەمەکان"
            data-ph-en="Same ID for all items"
          />
        </div>

        <!-- Custom ID Section -->
        <div id="customIdSection" class="id-sub-section" style="display:none">
          <div id="customIdRows"></div>
        </div>
      </div>

    </div><!-- /card-required -->

    <!-- Card 2: Optional -->
    <div class="card" id="card-optional">
      <div class="card-title">
        <span class="ku">زانیاری دیکە (ئارەزوومەندانە)</span>
        <span class="en">Additional Info (Optional)</span>
      </div>

      <!-- Category -->
      <div class="field-group">
        <label for="category">
          <span class="ku">جۆری بەرهەم</span>
          <span class="en">Category</span>
        </label>
        <select id="category">
          <option value="">
            <span class="ku">هەڵبژێرە...</span>
            <span class="en">Select...</span>
          </option>
        </select>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label for="description">
          <span class="ku">وەسف</span>
          <span class="en">Description</span>
        </label>
        <textarea
          id="description"
          rows="3"
          data-ph-ku="وەسفی بەرهەم..."
          data-ph-en="Product description..."
        ></textarea>
      </div>

      <!-- Notes -->
      <div class="field-group">
        <label for="notes">
          <span class="ku">تێبینی</span>
          <span class="en">Notes</span>
        </label>
        <textarea
          id="notes"
          rows="3"
          data-ph-ku="تێبینییەکانت لێرە بنووسە..."
          data-ph-en="Any notes here..."
        ></textarea>
      </div>

      <!-- Warranty -->
      <div class="field-group">
        <label for="warranty">
          <span class="ku">گەرەنتی</span>
          <span class="en">Warranty</span>
        </label>
        <input
          type="text"
          id="warranty"
          data-ph-ku="بۆ نموونە: ١ ساڵ"
          data-ph-en="e.g. 1 year"
        />
      </div>

      <!-- Image Upload -->
      <div class="field-group">
        <label>
          <span class="ku">وێنەی بەرهەم</span>
          <span class="en">Product Image</span>
        </label>
        <div class="image-upload-area" id="imageUploadArea">
          <input type="file" id="imageInput" accept="image/*" style="display:none" />
          <div class="image-upload-placeholder" id="imagePlaceholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
            <span class="ku">کلیک بکە بۆ بارکردنی وێنە</span>
            <span class="en">Click to upload image</span>
          </div>
          <img id="imagePreview" style="display:none" alt="preview" />
          <button id="removeImage" style="display:none" class="remove-image-btn">
            <span class="ku">سڕینەوە</span>
            <span class="en">Remove</span>
          </button>
        </div>
      </div>

      <!-- Payment Status -->
      <div class="field-group">
        <label>
          <span class="ku">دۆخی پارەدان</span>
          <span class="en">Payment Status</span>
        </label>
        <div class="payment-toggle">
          <button class="pay-btn active" data-status="paid" id="btnPaid">
            <span class="ku">پارەدراوە</span>
            <span class="en">Paid</span>
          </button>
          <button class="pay-btn" data-status="debt" id="btnDebt">
            <span class="ku">قەرزە</span>
            <span class="en">Debt</span>
          </button>
        </div>
      </div>

    </div><!-- /card-optional -->

    <!-- Action Buttons -->
    <div class="form-actions">
      <button id="btnSave" class="btn-primary">
        <span class="ku">پاشەکەوتکردنی کڕین ✓</span>
        <span class="en">Save Purchase ✓</span>
      </button>
      <button id="btnReset" class="btn-ghost">
        <span class="ku">سڕینەوەی فۆرم</span>
        <span class="en">Reset Form</span>
      </button>
    </div>

  </section><!-- /addTab -->

  <!-- LIST TAB -->
  <section id="listTab" class="tab-content">
    <div id="listContainer">
      <!-- Rendered by JS -->
    </div>
  </section>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- PRINT AREA -->
  <div id="printArea"></div>

  <script src="app.js"></script>
</body>
</html>
