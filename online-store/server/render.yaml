# One concrete, ready-to-go deployment target (Render: simple, has a persistent-disk
# option, cheap free/starter tier). The Dockerfile in this same folder works on any
# Docker host — Fly.io, Railway, DigitalOcean, a plain VPS — this file is just Render's
# specific Infrastructure-as-Code format, not a requirement to use Render.
#
# Usage: Render dashboard -> New -> Blueprint -> point at this repo -> it reads this file.
services:
  - type: web
    name: online-store-api
    runtime: docker
    # This service is currently configured as a MANUAL Docker Web Service in the Render
    # dashboard, not as a synced Blueprint — the dashboard's own "Root Directory" and
    # "Docker Build Context Directory" fields are what Render actually builds with, and
    # they are NOT read from this file. Whatever you set here, also set those two dashboard
    # fields to the repo root (blank/"."), or every cross-boundary COPY below breaks again
    # with "not found" errors, since Docker can never COPY files from outside its context.
    dockerContext: .
    dockerfilePath: ./online-store/server/Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PUBLIC_API_URL
        value: https://api.froshiar.store
    disk:
      name: online-store-data
      mountPath: /app/data
      sizeGB: 1
    autoDeploy: true
